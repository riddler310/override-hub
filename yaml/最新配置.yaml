port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
geodata-mode: true
geo-auto-update: true
geodata-loader: standard
geo-update-interval: 24
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"
dns:
  enable: true
  ipv6: true
  respect-rules: true
  enhanced-mode: fake-ip
  nameserver:
    - "https://120.53.53.53/dns-query"
    - "https://223.5.5.5/dns-query"
  proxy-server-nameserver:
    - "https://120.53.53.53/dns-query"
    - "https://223.5.5.5/dns-query"
  nameserver-policy:
    geosite:cn,private:
      - "https://120.53.53.53/dns-query"
      - "https://223.5.5.5/dns-query"
    geosite:geolocation-!cn:
      - "https://dns.cloudflare.com/dns-query"
      - "https://dns.google/dns-query"
proxy-groups:
  - name: 🚀 主力
    type: select
    interval: 0
    url: &url http://www.gstatic.com/generate_204
    include-all: true
    proxies:
      - DIRECT
  - name: 📹 油管视频
    type: select
    interval: 0
    url: *url
    include-all: true
    proxies:
      - 🚀 主力
  - name: 🔍 谷歌服务
    type: select
    interval: 0
    url: *url
    include-all: true
    proxies:
      - 🚀 主力
  - name: 🤖 AI 服务
    type: select
    interval: 0
    url: *url
    include-all: true
    proxies:
      - 🚀 主力
  - name: 📲 电报消息
    type: select
    interval: 0
    url: *url
    include-all: true
    proxies:
      - 🚀 主力
  - name: 🎬 流媒体
    type: select
    interval: 0
    url: *url
    include-all: true
    proxies:
      - 🚀 主力
  - name: 🎶 Tiktok
    type: select
    interval: 0
    url: *url
    include-all: true
    proxies:
      - 🚀 主力
  - name: 🎵 Spotify
    type: select
    interval: 0
    url: *url
    include-all: true
    proxies:
      - 🚀 主力
  - name: 🔒 国内服务
    type: select
    interval: 0
    proxies:
      - DIRECT
      - 🚀 主力
  - name: 🛑 广告
    type: select
    interval: 0
    url: *url
    proxies:
      - REJECT
      - REJECT-DROP
      - DIRECT
      - 🚀 主力
  - name: 🐟 漏网之鱼
    type: select
    interval: 0
    url: *url
    proxies:
      - 🚀 主力
      - DIRECT
rules:
  - "RULE-SET,category-ads-all,🛑 广告"
  - "RULE-SET,youtube,📹 油管视频"
  - "RULE-SET,google,🔍 谷歌服务"
  - "RULE-SET,category-ai-!cn,🤖 AI 服务"
  - "RULE-SET,openai,🤖 AI 服务"
  - "RULE-SET,telegram,📲 电报消息"
  - "RULE-SET,netflix,🎬 流媒体"
  - "RULE-SET,hulu,🎬 流媒体"
  - "RULE-SET,disney,🎬 流媒体"
  - "RULE-SET,hbo,🎬 流媒体"
  - "RULE-SET,amazon,🎬 流媒体"
  - "RULE-SET,bahamut,🎬 流媒体"
  - "RULE-SET,tiktok,🎶 Tiktok"
  - "RULE-SET,spotify,🎵 Spotify"
  - "RULE-SET,google-ip,🔍 谷歌服务,no-resolve"
  - "RULE-SET,geolocation-cn,🔒 国内服务"
  - "RULE-SET,cn-domains,🔒 国内服务"
  - "RULE-SET,cn,🔒 国内服务,no-resolve"
  - "RULE-SET,telegram-ip,📲 电报消息,no-resolve"
  - "MATCH,🐟 漏网之鱼"
rule-providers:
