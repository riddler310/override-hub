mode: rule
ipv6: true
allow-lan: false
log-level: info
mixed-port: 12345
unified-delay: true
tcp-concurrent: true
external-controller: 127.0.0.1:9090
find-process-mode: strict
global-client-fingerprint: firefox
geodata-mode: true
geo-auto-update: true
geodata-loader: standard
geo-update-interval: 24
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"
  
profile:
  store-selected: true
  store-fake-ip: true

hosts:
  time.facebook.com: 17.253.84.125
  time.android.com: 17.253.84.125

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

dns:
  enable: true
  ipv6: true
  prefer-h3: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    - rule-set,cn
    - rule-set,fakeip-filter
  default-nameserver: &cn
    - quic://223.5.5.5
    - quic://223.6.6.6
  nameserver:
    # 如果常用 TCP 协议的节点，如 vless、trojan 等
    # 不包含没开 udp over tcp 的 ss！！！
    # 请将此字段下未注释的行替换为如下内容
     - tcp://8.8.8.8
     - tcp://8.8.4.4
    #- 8.8.8.8
    #- 8.8.4.4
  proxy-server-nameserver: *cn
  direct-nameserver: *cn
  nameserver-policy:
    rule-set:cn: *cn

tun:
  enable: true
  stack: system
  device: utun-akasha
  gso: true
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
proxy-groups:
  - name: 🚀 主力
    type: select
    interval: 0
    url: &url http://www.gstatic.com/generate_204
    include-all: true
    proxies:
      - DIRECT
  - name: 📹 油管视频
    type: select
    interval: 0
    url: *url
    include-all: true
    proxies:
      - 🚀 主力
  - name: 🔍 谷歌服务
    type: select
    interval: 0
    url: *url
    include-all: true
    proxies:
      - 🚀 主力
  - name: 🤖 AI 服务
    type: select
    interval: 0
    url: *url
    include-all: true
    proxies:
      - 🚀 主力
  - name: 📲 电报消息
    type: select
    interval: 0
    url: *url
    include-all: true
    proxies:
      - 🚀 主力
  - name: 🎬 流媒体
    type: select
    interval: 0
    url: *url
    include-all: true
    proxies:
      - 🚀 主力
  - name: 🎶 Tiktok
    type: select
    interval: 0
    url: *url
    include-all: true
    proxies:
      - 🚀 主力
  - name: 🎵 Spotify
    type: select
    interval: 0
    url: *url
    include-all: true
    proxies:
      - 🚀 主力
  - name: 🔒 国内服务
    type: select
    interval: 0
    proxies:
      - DIRECT
      - 🚀 主力
  - name: 🛑 广告
    type: select
    interval: 0
    url: *url
    proxies:
      - REJECT
      - REJECT-DROP
      - DIRECT
      - 🚀 主力
  - name: 🐟 漏网之鱼
    type: select
    interval: 0
    url: *url
    proxies:
      - 🚀 主力
      - DIRECT
rules:
  - "RULE-SET,private,DIRECT"
  - "RULE-SET,privateip,DIRECT,no-resolve"
  - "AND,((NETWORK,UDP),(DST-PORT,443)),REJECT"
  - "RULE-SET,category-ads-all,🛑 广告"
  - "RULE-SET,youtube,📹 油管视频"
  - "RULE-SET,google,🔍 谷歌服务"
  - "RULE-SET,geolocation-cn,🔒 国内服务"
  - "RULE-SET,cn-domains,🔒 国内服务"
  - "RULE-SET,category-ai-!cn,🤖 AI 服务"
  - "RULE-SET,openai,🤖 AI 服务"
  - "RULE-SET,telegram,📲 电报消息"
  - "RULE-SET,netflix,🎬 流媒体"
  - "RULE-SET,hulu,🎬 流媒体"
  - "RULE-SET,disney,🎬 流媒体"
  - "RULE-SET,hbo,🎬 流媒体"
  - "RULE-SET,amazon,🎬 流媒体"
  - "RULE-SET,bahamut,🎬 流媒体"
  - "RULE-SET,tiktok,🎶 Tiktok"
  - "RULE-SET,spotify,🎵 Spotify"
  - "RULE-SET,google-ip,🔍 谷歌服务,no-resolve"
  - "RULE-SET,cn,🔒 国内服务,no-resolve"
  - "RULE-SET,telegram-ip,📲 电报消息,no-resolve"
  - "DOMAIN-SUFFIX,steamcontent.com,DIRECT"
  - "DOMAIN-SUFFIX,steamstatic.com,DIRECT"
  - "DOMAIN-KEYWORD,steamcdn,DIRECT"
  - "MATCH,🐟 漏网之鱼"
