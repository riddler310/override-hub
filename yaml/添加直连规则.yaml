mode: rule
ipv6: true
allow-lan: false
log-level: info
mixed-port: 12345
unified-delay: true
tcp-concurrent: true
external-controller: 127.0.0.1:9090
find-process-mode: strict
global-client-fingerprint: firefox
geodata-mode: false

profile:
  store-selected: true
  store-fake-ip: true

hosts:
  time.facebook.com: 17.253.84.125
  time.android.com: 17.253.84.125

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

dns:
  enable: true
  ipv6: true
  prefer-h3: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    - rule-set,cn
    - rule-set,fakeip-filter
  default-nameserver: &cn
    - quic://223.5.5.5
    - quic://223.6.6.6
  nameserver:
     - tcp://8.8.8.8
     - tcp://8.8.4.4
  proxy-server-nameserver: *cn
  direct-nameserver: *cn
  nameserver-policy:
    rule-set:cn: *cn

tun:
  enable: true
  stack: system
  device: utun-akasha
  gso: true
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

proxy-groups:
  # --- 主力节点组 ---
  - name: 🚀 主力
    type: select
    include-all: true
    proxies:
      - DIRECT

  # --- 直连组 ---
  - name: 🇨🇳 大陆网站
    type: select
    proxies:
      - DIRECT
      - 🚀 主力

  # --- 广告拦截 ---
  - name: 🛑 广告
    type: select
    proxies:
      - REJECT
      - REJECT-DROP
      - DIRECT

  # --- 核心代理组 (合并了原来的 AI/Netflix/Google/YouTube) ---
  - name: 🧱 国外网站 & 漏网之鱼
    type: select
    include-all: true
    proxies:
      - 🚀 主力
      - DIRECT

rules:
  - RULE-SET,private,DIRECT
  - RULE-SET,privateip,DIRECT,no-resolve
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  - DOMAIN,data.bilibili.com,🛑 广告
  - DOMAIN,dataflow.bilibili.com,🛑 广告
  - RULE-SET,ads,🛑 广告
  
  # 所有原本的分流规则现在全部指向“国外网站”组
  - RULE-SET,netflix,🧱 国外网站 & 漏网之鱼
  - RULE-SET,youtube,🧱 国外网站 & 漏网之鱼
  - GEOSITE,google,🧱 国外网站 & 漏网之鱼
  - DOMAIN-SUFFIX,grok.com,🧱 国外网站 & 漏网之鱼
  - DOMAIN-SUFFIX,x.ai,🧱 国外网站 & 漏网之鱼
  - DOMAIN-SUFFIX,perplexity.ai,🧱 国外网站 & 漏网之鱼
  - RULE-SET,ai,🧱 国外网站 & 漏网之鱼
  
  # 基础分流
  - DOMAIN-SUFFIX,steamcontent.com,DIRECT
  - DOMAIN-SUFFIX,steamstatic.com,DIRECT
  - DOMAIN-KEYWORD,steamcdn,DIRECT
  - RULE-SET,proxy,🧱 国外网站 & 漏网之鱼
  - RULE-SET,cn,🇨🇳 大陆网站
  - RULE-SET,cnip,🇨🇳 大陆网站
  - MATCH,🧱 国外网站 & 漏网之鱼

rule-providers:
  private:
    <<: &r
      type: http
      behavior: domain
      format: mrs
      interval: 86400
    path: ./rules/private.mrs
    url: "https://cdn.jsdmirror.com/gh/DustinWin/ruleset_geodata@mihomo-ruleset/private.mrs"
  privateip:
    <<: *r
    path: ./rules/privateip.mrs
    url: "https://cdn.jsdmirror.com/gh/DustinWin/ruleset_geodata@mihomo-ruleset/privateip.mrs"
  fakeip-filter:
    <<: *r
    path: ./rules/fakeip-filter.mrs
    url: "https://cdn.jsdmirror.com/gh/DustinWin/ruleset_geodata@mihomo-ruleset/fakeip-filter.mrs"
  ads:
    <<: *r
    path: ./rules/ads.mrs
    url: "https://cdn.jsdmirror.com/gh/DustinWin/ruleset_geodata@mihomo-ruleset/ads.mrs"
  ai:
    <<: *r
    path: ./rules/ai.mrs
    url: "https://cdn.jsdmirror.com/gh/DustinWin/ruleset_geodata@mihomo-ruleset/ai.mrs"
  netflix:
    <<: *r
    path: ./rules/netflix.mrs
    url: "https://cdn.jsdmirror.com/gh/DustinWin/ruleset_geodata@mihomo-ruleset/netflix.mrs"
  youtube:
    <<: *r
    path: ./rules/youtube.mrs
    url: "https://cdn.jsdmirror.com/gh/DustinWin/ruleset_geodata@mihomo-ruleset/youtube.mrs"
  proxy:
    <<: *r
    path: ./rules/proxy.mrs
    url: "https://cdn.jsdmirror.com/gh/DustinWin/ruleset_geodata@mihomo-ruleset/proxy.mrs"
  cn:
    <<: *r
    path: ./rules/cn.mrs
    url: "https://cdn.jsdmirror.com/gh/DustinWin/ruleset_geodata@mihomo-ruleset/cn.mrs"
  cnip:
    type: http
    behavior: ipcidr
    format: mrs
    interval: 86400
    path: ./rules/cnip.mrs
    url: "https://cdn.jsdmirror.com/gh/DustinWin/ruleset_geodata@mihomo-ruleset/cnip.mrs"
